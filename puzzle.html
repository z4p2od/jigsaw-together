<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jigsaw Together</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Loading puzzle...</p>
  </div>

  <div id="celebration">
    <h2>🎉 Puzzle Complete!</h2>
    <p>You solved it together!</p>
    <a href="/" class="btn">Start a new puzzle</a>
  </div>

  <div class="puzzle-page">
    <header class="puzzle-header">
      <h2>Jigsaw Together</h2>
      <div class="share-box">
        <span id="share-url"></span>
        <button id="copy-btn">Copy Link</button>
      </div>
      <span class="progress-text" id="progress-text">0 / 0 pieces</span>
    </header>

    <div class="puzzle-board-wrap">
      <div id="puzzle-board"></div>
    </div>
  </div>

  <script type="module" src="/js/puzzle.js"></script>
</body>
</html>
