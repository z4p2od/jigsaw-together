<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jigsaw Together</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Loading puzzle...</p>
  </div>

  <!-- Name modal -->
  <div id="name-modal" class="modal-overlay">
    <div class="modal">
      <h3>What's your name?</h3>
      <input id="name-input" type="text" class="name-input" placeholder="Your name" maxlength="20" />
      <button id="name-submit" class="btn">Join Puzzle</button>
    </div>
  </div>

  <div id="celebration">
    <h2>🎉 Puzzle Complete!</h2>
    <p id="celebration-time"></p>
    <a href="/" class="btn">Start a new puzzle</a>
  </div>

  <div class="puzzle-page">
    <header class="puzzle-header">
      <h2>Jigsaw Together</h2>
      <div class="share-box">
        <span id="share-url"></span>
        <button id="copy-btn">Copy Link</button>
      </div>
      <div class="header-right">
        <div id="players-list" class="players-list"></div>
        <span id="timer-display" class="timer">0:00</span>
        <span class="progress-text" id="progress-text">0 / 0 pieces</span>
      </div>
    </header>

    <div class="puzzle-board-wrap">
      <div id="puzzle-board"></div>
    </div>
  </div>

  <script type="module" src="/js/puzzle.js"></script>
</body>
</html>
